<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        body{
            background: url("static/note.webp");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form_account{
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 25px rgb(0, 84, 97);
        }
        h2{
            text-align: center;
            margin-bottom: 10px;
        }
        label{
            color: rgb(59, 193, 168) ;
            display: block;
            margin-bottom: 5px;
            font-weight: 550;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .btn-link {
            display: block;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            padding: 10px;
            background: rgb(12, 119, 121);
            color: white;
            cursor: pointer;
            font-size: 16px;
            }

        .btn-link:hover {
                    background: rgb(59, 193, 168);
            }
        p{
            color: red;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <form class="form_account" action="/create_account" method="post">
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <p>{{message}}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <label>User Name</label>
        <input type="text" name="user_name" required>
        <label>Email </label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit" class="create-btn btn-link">Submit</button>

    </form>
    
</body>
</html>
