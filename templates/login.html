<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Form</title>
  <style>
        body{
            background: url("static/note.webp");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box{
            padding: 30px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 25px rgb(0, 84, 97);
        }
        h2{
            text-align: center;
            margin-bottom: 10px;
        }
        label{
            color: rgb(59, 193, 168) ;
            display: block;
            margin-bottom: 5px;
            font-weight: bolder;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        .btn-link {
            display: block;
            text-decoration: none;
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            padding: 10px;
            background: rgb(12, 119, 121);
            color: white;
            cursor: pointer;
            font-size: 16px;
    }

    .btn-link:hover {
            background: rgb(59, 193, 168);
    }
    p{
        color: red;
        font-weight: bold;
    }
    </style>
</head>
<body>

  <form class="login-box" action=""  method="post">
    <h2>Login</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <p>{{message}}</p>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <label for="username">Email</label>
    <input type="email" id="username" placeholder="Enter Email" required name="email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" required name="password">

    <button type="submit" class="create-btn btn-link">Login</button>
    
  </form>

</body>
</html>
